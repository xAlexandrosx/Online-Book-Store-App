databaseChangeLog:
  - changeSet:
      id: 1782052664798-1
      author: user
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_cart_items
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: book_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: quantity
                  type: INT
              - column:
                  constraints:
                    nullable: false
                  name: shopping_cart_id
                  type: BIGINT

  - changeSet:
      id: 1782052664798-2
      author: user
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: book_id
            baseTableName: cart_items
            constraintName: FK_CART_ITEMS_ON_BOOK
            referencedColumnNames: id
            referencedTableName: books
  - changeSet:
      id: 1782052664798-3
      author: user
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: shopping_cart_id
            baseTableName: cart_items
            constraintName: FK_CART_ITEMS_ON_SHOPPING_CART
            referencedColumnNames: id
            referencedTableName: shopping_carts