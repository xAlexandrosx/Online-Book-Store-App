databaseChangeLog:
  - changeSet:
      id: create-category-and-book_categories-table
      author: Aleksander Koz
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
                    unique: false
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false



        - createTable:
            tableName: book_categories
            columns:
              - column:
                  name: book_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: book_categories
            columnNames: book_id, category_id
            constraintName: pk_book_categories

        - addForeignKeyConstraint:
            baseTableName: book_categories
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_book_categories_on_book
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: book_categories
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_book_categories_on_category
            onDelete: CASCADE